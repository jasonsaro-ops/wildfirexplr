<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WILDFIREXPLR // US ACTIVE WILDFIRE & ENVIRONMENTAL DASHBOARD</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Golden Layout Stylesheets -->
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-base.css" />
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/src/css/goldenlayout-dark-theme.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d1117;
            font-family: 'Share Tech Mono', monospace;
            color: #00ffcc;
        }
        #header-bar {
            height: 40px;
            background: #161b22;
            border-bottom: 2px solid #ff6600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        .title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-shadow: 0 0 5px rgba(255,102,0,0.6);
            color: #ff9900;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sources-badges {
            display: flex;
            gap: 6px;
            font-size: 0.65rem;
        }
        .source-badge {
            background: #21262d;
            border: 1px solid #30363d;
            color: #00ffcc;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .timer-badge {
            background: #21262d;
            padding: 4px 10px;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #00ffcc;
        }
        #desktopLayoutContainer {
            width: 100%;
            height: calc(100vh - 40px);
            position: relative;
        }
        .weather-component {
            padding: 12px;
            height: 100%;
            background: #0d1117;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .fire-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-left: 4px solid #ff3300;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .fire-card:hover { border-color: #ff3300; background: #1f242c; box-shadow: 0 0 8px rgba(255, 51, 0, 0.3); }
        .wfigs-card:hover { border-color: #00ffcc; box-shadow: 0 0 8px rgba(0, 255, 204, 0.3); }

        /* Clickable Stat Cards */
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            border-color: #ff6600;
            background: #1f242c;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.25);
        }

        .aqi-interactive-card {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 8px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .aqi-interactive-card:hover { border-color: #00ffcc; background: #1f242c; }

        .hub-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.88);
            backdrop-filter: blur(4px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .hub-modal-content {
            background: #161b22;
            border: 2px solid #ff6600;
            width: 95%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .hub-modal-header {
            background: #21262d;
            padding: 12px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hub-modal-title { font-size: 1.1rem; font-weight: bold; color: #ff9900; text-transform: uppercase; }
        .hub-modal-close { color: #8b949e; cursor: pointer; font-size: 1.2rem; }
        .hub-modal-close:hover { color: #ff5555; }
        .hub-modal-body { padding: 20px; overflow-y: auto; color: #fff; }

        /* Leaflet Map & Red Flame Markers */
        .leaflet-container { background: #0d1117 !important; font-family: 'Share Tech Mono', monospace !important; }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: #161b22 !important; color: #fff !important; border: 1px solid #ff3300; }
        .wfigs-popup .leaflet-popup-content-wrapper, .wfigs-popup .leaflet-popup-tip { border-color: #00ffcc; }
        .leaflet-popup-content { font-size: 0.85rem; }
        
        .fire-icon-red {
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; color: #ff3300;
            text-shadow: 0px 0px 6px #ff0000, 0px 0px 10px #ff6600;
            animation: flamePulse 1.2s infinite alternate; cursor: pointer;
        }
        .wfigs-icon-red {
            display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: #ff2200;
            text-shadow: 0px 0px 8px #ff0000, 0px 0px 14px #ff5500;
            animation: flamePulse 1.4s infinite alternate; cursor: pointer;
        }

        @keyframes flamePulse {
            0% { transform: scale(0.92); opacity: 0.85; filter: drop-shadow(0 0 2px #ff3300); }
            100% { transform: scale(1.18); opacity: 1; filter: drop-shadow(0 0 8px #ff0000); }
        }

        /* Golden Layout Overrides */
        .lm_header { background: #161b22 !important; }
        .lm_tab { background: #21262d !important; color: #8b949e !important; font-family: 'Share Tech Mono', monospace !important; border: 1px solid #30363d !important;}
        .lm_tab.lm_active { background: #0d1117 !important; color: #ff9900 !important; border-bottom: none !important; box-shadow: 0 -2px 0 #ff6600 inset;}
        .lm_content { background: #0d1117 !important; border: 1px solid #21262d; }

        .btn-control {
            background: #161b22; border: 1px solid #30363d; cursor: pointer; padding: 4px 8px; 
            font-family: 'Share Tech Mono', monospace; border-radius: 3px; transition: 0.2s;
        }
        .btn-control:hover { background: #21262d; border-color: #ff6600; }
    </style>
</head>
<body>

    <div id="header-bar">
        <div class="title">
            <i class="fa-solid fa-fire-flame-curved" style="color:#ff3300;"></i> WILDFIREXPLR // NATIONWIDE FIRE & ENVIRONMENTAL MATRIX
        </div>
        <div class="sources-badges">
            <span class="source-badge"><i class="fa-solid fa-shield-halved"></i> NIFC WFIGS</span>
            <span class="source-badge"><i class="fa-solid fa-satellite"></i> NASA FIRMS</span>
            <span class="source-badge"><i class="fa-solid fa-globe"></i> NASA EONET</span>
            <span class="source-badge"><i class="fa-solid fa-cloud-sun"></i> NWS</span>
            <span class="source-badge"><i class="fa-solid fa-wind"></i> EPA AirNow</span>
        </div>
        <div class="timer-badge">SYNC: <span id="countdown">120</span>s</div>
    </div>

    <div id="desktopLayoutContainer"></div>

    <div id="hubFloatingModal" class="hub-modal">
        <div class="hub-modal-content">
            <div class="hub-modal-header">
                <div id="modalTitle" class="hub-modal-title">Telemetry Overview</div>
                <div class="hub-modal-close" onclick="closeFloatingModal()"><i class="fa-solid fa-xmark"></i></div>
            </div>
            <div id="modalBody" class="hub-modal-body">Querying interagency feeds...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/golden-layout@1.5.9/dist/goldenlayout.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
